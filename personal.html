<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
<title>Personal — Planner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="page-head-row">
    <div>
      <h2>Personal</h2>
      <p class="subtitle">Personal tasks and projects</p>
    </div>
    <button class="new-folder-btn" id="new-folder-btn">+ New folder</button>
  </div>

  <div id="sections" class="fsec-row"></div>
  <div class="empty hidden" id="empty">No personal tasks yet. Hit "Add Task" to get started.</div>

</div>

<script src="app.js"></script>
<script>
requireAuth('personal', (user) => {
  const CATEGORY = 'personal';
  const sectionsEl = document.getElementById('sections');
  const emptyEl    = document.getElementById('empty');
  const newFolderBtn = document.getElementById('new-folder-btn');
  let sortBy = 'priority';
  let editingStages = false;

  newFolderBtn.onclick = async () => {
    const name = prompt('Folder name:');
    if (!name || !name.trim()) return;
    await db.from('folders').insert([{ name: name.trim(), category: CATEGORY }]);
    load();
  };

  async function load() {
    const filterFolder = new URLSearchParams(window.location.search).get('folder');

    let folderQuery = db.from('folders').select('*').eq('category', CATEGORY).order('id', { ascending: true });
    if (filterFolder) folderQuery = folderQuery.eq('id', filterFolder);

    const [{ data: folderData }, { data: taskData }] = await Promise.all([
      folderQuery,
      db.from('todos').select('*').eq('category', CATEGORY).eq('is_deleted', false)
    ]);
    render(folderData || [], taskData || [], !!filterFolder);
    if (typeof renderNavFolders === 'function') renderNavFolders('personal');
  }

  function render(folders, allTasks, isFiltered) {
    sectionsEl.innerHTML = '';
    emptyEl.classList.add('hidden');

    if (isFiltered && folders.length === 1) {
      sectionsEl.className = 'fd-view';
      newFolderBtn.classList.add('hidden');
      renderFolderDetail(folders[0], allTasks);
      return;
    }

    sectionsEl.className = 'fsec-row';
    newFolderBtn.classList.remove('hidden');
    let hasContent = false;

    folders.forEach(folder => {
      const folderTasks = allTasks.filter(t => String(t.folder_id) === String(folder.id));
      const active = folderTasks.filter(t => !t.is_completed);
      const doneCount = folderTasks.filter(t => t.is_completed).length;
      sectionsEl.appendChild(buildSection(folder, active, doneCount, folderTasks.length));
      hasContent = true;
    });

    const loose = allTasks.filter(t => !t.folder_id);
    if (loose.length > 0) {
      const looseActive = loose.filter(t => !t.is_completed);
      const looseDone   = loose.filter(t => t.is_completed).length;
      sectionsEl.appendChild(buildSection(null, looseActive, looseDone, loose.length));
      hasContent = true;
    }

    emptyEl.classList.toggle('hidden', hasContent || folders.length > 0);
  }

  function renderFolderDetail(folder, allTasks) {
    const DEFAULT_STAGES = [{id:'todo',label:'Not started'},{id:'doing',label:'In progress'}];
    const stages = (folder.custom_statuses && folder.custom_statuses.length > 0)
      ? folder.custom_statuses : DEFAULT_STAGES;
    const DOT_COLORS = ['var(--muted)','var(--personal)','var(--accent)','var(--done)','var(--danger)'];

    const tasks = allTasks.filter(t => String(t.folder_id) === String(folder.id));
    const doneCount = tasks.filter(t => t.is_completed).length;
    const totalCount = tasks.length;
    const pct = totalCount > 0 ? Math.round(doneCount / totalCount * 100) : 0;

    // Header
    const head = document.createElement('div');
    head.className = 'fd-head';
    const nameEl = document.createElement('div');
    nameEl.className = 'fd-name';
    nameEl.innerHTML = `<span class="nav-icon">${IC.fold}</span>${folder.name}`;
    const right = document.createElement('div');
    right.className = 'fd-right';
    const statsEl = document.createElement('span');
    statsEl.className = 'fd-stats';
    statsEl.innerText = totalCount > 0 ? `${doneCount} / ${totalCount} done · ${pct}%` : 'No tasks yet';
    right.appendChild(statsEl);

    const editStagesBtn = document.createElement('button');
    editStagesBtn.className = 'fd-edit-stages-btn';
    editStagesBtn.innerText = editingStages ? '✕ Cancel' : 'Edit stages';
    editStagesBtn.onclick = () => { editingStages = !editingStages; load(); };
    right.appendChild(editStagesBtn);

    const renameBtn = document.createElement('button');
    renameBtn.className = 'fsec-rename'; renameBtn.title = 'Rename folder';
    renameBtn.innerHTML = IC.pencil;
    renameBtn.onclick = async () => {
      const name = prompt('Rename folder:', folder.name);
      if (!name || !name.trim() || name.trim() === folder.name) return;
      await db.from('folders').update({ name: name.trim() }).eq('id', folder.id);
      load();
    };
    right.appendChild(renameBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'fsec-del'; delBtn.title = 'Delete folder';
    delBtn.innerHTML = IC.trash;
    delBtn.onclick = async () => {
      if (!confirm(`Delete folder "${folder.name}"? Tasks will become unassigned.`)) return;
      await db.from('folders').delete().eq('id', folder.id);
      window.location.href = 'personal.html';
    };
    right.appendChild(delBtn);
    head.append(nameEl, right);
    sectionsEl.appendChild(head);

    // Progress bar
    const progWrap = document.createElement('div');
    progWrap.className = 'fd-prog-wrap';
    const progFill = document.createElement('div');
    progFill.className = 'fsec-prog-fill personal';
    progFill.style.width = pct + '%';
    progWrap.appendChild(progFill);
    sectionsEl.appendChild(progWrap);

    // ── Stage editor ──────────────────────────────────────────
    if (editingStages) {
      let editStages = JSON.parse(JSON.stringify(stages));
      const panel = document.createElement('div');
      panel.className = 'stage-editor';

      const panelTitle = document.createElement('div');
      panelTitle.className = 'stage-editor-title';
      panelTitle.innerText = 'Stages';
      panel.appendChild(panelTitle);

      const listEl = document.createElement('div');
      listEl.className = 'stage-editor-list';

      function renderList() {
        listEl.innerHTML = '';
        editStages.forEach((s, i) => {
          const row = document.createElement('div');
          row.className = 'stage-editor-row';
          const dot = document.createElement('div');
          dot.className = 'board-dot';
          dot.style.background = DOT_COLORS[i % DOT_COLORS.length];
          dot.style.flexShrink = '0';
          const input = document.createElement('input');
          input.type = 'text'; input.value = s.label;
          input.className = 'stage-editor-input';
          input.oninput = () => { editStages[i] = {...editStages[i], label: input.value}; };
          const del = document.createElement('button');
          del.className = 'fsec-del'; del.innerHTML = IC.trash;
          del.onclick = () => { if (editStages.length > 1) { editStages.splice(i, 1); renderList(); } };
          row.append(dot, input, del);
          listEl.appendChild(row);
        });
      }
      renderList();
      panel.appendChild(listEl);

      const addBtn = document.createElement('button');
      addBtn.className = 'stage-editor-add';
      addBtn.innerText = '+ Add stage';
      addBtn.onclick = () => {
        editStages.push({id: 'stage_' + Date.now(), label: 'New stage'});
        renderList();
      };
      panel.appendChild(addBtn);

      const actions = document.createElement('div');
      actions.className = 'stage-editor-actions';
      const saveBtn = document.createElement('button');
      saveBtn.className = 'btn-save'; saveBtn.innerText = 'Save';
      saveBtn.onclick = async () => {
        const valid = editStages.filter(s => s.label.trim());
        await db.from('folders').update({custom_statuses: valid}).eq('id', folder.id);
        editingStages = false;
        load();
      };
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn-cancel'; cancelBtn.innerText = 'Cancel';
      cancelBtn.onclick = () => { editingStages = false; load(); };
      actions.append(saveBtn, cancelBtn);
      panel.appendChild(actions);
      sectionsEl.appendChild(panel);
      return;
    }

    // ── Board ─────────────────────────────────────────────────
    const ctrlRow = document.createElement('div');
    ctrlRow.className = 'fd-ctrl-row';
    const sortBar = document.createElement('div');
    sortBar.className = 'fd-sort-bar';
    [['priority','Priority'],['due','Due date']].forEach(([key, label]) => {
      const btn = document.createElement('button');
      btn.className = 'fd-sort-btn' + (sortBy === key ? ' active' : '');
      btn.innerText = label;
      btn.onclick = () => { sortBy = key; load(); };
      sortBar.appendChild(btn);
    });
    ctrlRow.append(sortBar);
    sectionsEl.appendChild(ctrlRow);

    function sortTasks(arr) {
      if (sortBy === 'due') return [...arr].sort((a,b) => {
        if (!a.due_date && !b.due_date) return 0;
        if (!a.due_date) return 1; if (!b.due_date) return -1;
        return a.due_date.localeCompare(b.due_date);
      });
      return [...arr].sort((a,b) => (b.priority||0) - (a.priority||0));
    }

    function buildStageSelect(task) {
      const sel = document.createElement('select');
      sel.className = 'status-select';
      stages.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id; opt.innerText = s.label;
        sel.appendChild(opt);
      });
      const doneOpt = document.createElement('option');
      doneOpt.value = 'done'; doneOpt.innerText = '● Mark as done';
      sel.appendChild(doneOpt);
      const cur = task.status || (task.is_completed ? 'done' : stages[0].id);
      sel.value = (stages.some(s => s.id === cur) || cur === 'done') ? cur : stages[0].id;
      sel.setAttribute('data-status', sel.value);
      sel.onclick = e => e.stopPropagation();
      sel.onchange = async e => {
        e.stopPropagation();
        const next = sel.value;
        sel.setAttribute('data-status', next);
        await db.from('todos').update({status: next, is_completed: next === 'done'}).eq('id', task.id);
        task.status = next; task.is_completed = next === 'done';
        load();
      };
      return sel;
    }

    if (tasks.length === 0) {
      const msg = document.createElement('div');
      msg.className = 'fsec-empty'; msg.style.padding = '40px 0';
      msg.innerText = 'No tasks in this folder yet';
      sectionsEl.appendChild(msg);
    } else {
      const colCount = stages.length;
      const board = document.createElement('div');
      board.className = 'board';
      board.style.gridTemplateColumns = `repeat(${colCount}, 1fr)`;

      stages.forEach((col, idx) => {
        const colTasks = sortTasks(tasks.filter(t => {
          if (t.is_completed) return false;
          const st = t.status || stages[0].id;
          const inStage = st === col.id;
          const isOrphan = !stages.some(s => s.id === st) && idx === 0;
          return inStage || isOrphan;
        }));

        const colEl = document.createElement('div');
        colEl.className = 'board-col';
        const colHead = document.createElement('div');
        colHead.className = 'board-col-head';
        const ttl = document.createElement('span');
        ttl.className = 'ttl';
        const dot = document.createElement('span');
        dot.className = 'board-dot';
        dot.style.background = DOT_COLORS[idx % DOT_COLORS.length];
        ttl.append(dot, document.createTextNode(col.label));
        const cnt = document.createElement('span');
        cnt.className = 'cnt'; cnt.innerText = colTasks.length;
        colHead.append(ttl, cnt);
        colEl.appendChild(colHead);

        if (colTasks.length === 0) {
          const e = document.createElement('div');
          e.className = 'board-empty'; e.innerText = '—';
          colEl.appendChild(e);
        }
        colTasks.forEach(t => {
          const card = document.createElement('div');
          card.className = 'board-card';
          const title = document.createElement('div');
          title.className = 'bc-title';
          if (t.kind === 'meeting') {
            const mi = document.createElement('span');
            mi.className = 'meet-icon'; mi.innerHTML = IC.meet;
            title.appendChild(mi);
          }
          title.appendChild(document.createTextNode(t.title));
          const meta = document.createElement('div');
          meta.className = 'bc-meta';
          if (t.priority > 0) {
            const p = document.createElement('span');
            p.className = 'tag prio-' + t.priority; p.innerText = '⚑';
            meta.appendChild(p);
          }
          if (t.due_date) {
            const d = document.createElement('span');
            d.className = 'tag due' + (isOverdue(t.due_date, t.is_completed) ? ' overdue' : '');
            d.innerText = formatDate(t.due_date);
            meta.appendChild(d);
          }
          card.append(title, meta, buildStageSelect(t));
          card.onclick = e => { if (e.target.closest('.status-select')) return; window.location.href = 'task.html?id=' + t.id; };
          colEl.appendChild(card);
        });
        board.appendChild(colEl);
      });
      sectionsEl.appendChild(board);
    }

    const addLink = document.createElement('a');
    addLink.className = 'fsec-add-btn';
    addLink.style.marginTop = '16px';
    addLink.href = `add.html?cat=${CATEGORY}&folder=${folder.id}`;
    addLink.innerText = '+ Add task';
    sectionsEl.appendChild(addLink);
  }

  function buildSection(folder, activeTasks, doneCount, totalCount) {
    const pct = totalCount > 0 ? Math.round(doneCount / totalCount * 100) : 0;

    const sec = document.createElement('div');
    sec.className = 'fsec';

    const head = document.createElement('div');
    head.className = 'fsec-head';

    const nameEl = document.createElement('div');
    nameEl.className = 'fsec-name';
    nameEl.innerHTML = `<span class="nav-icon" style="opacity:0.65">${IC.fold}</span>${folder ? folder.name : 'No folder'}`;

    const right = document.createElement('div');
    right.className = 'fsec-right';

    const stats = document.createElement('span');
    stats.className = 'fsec-stats';
    stats.innerText = totalCount > 0 ? `${doneCount} / ${totalCount} done` : 'empty';
    right.appendChild(stats);

    if (folder) {
      const renameBtn = document.createElement('button');
      renameBtn.className = 'fsec-rename';
      renameBtn.title = 'Rename folder';
      renameBtn.innerHTML = IC.pencil;
      renameBtn.onclick = async () => {
        const name = prompt('Rename folder:', folder.name);
        if (!name || !name.trim() || name.trim() === folder.name) return;
        await db.from('folders').update({ name: name.trim() }).eq('id', folder.id);
        load();
      };
      right.appendChild(renameBtn);

      const delBtn = document.createElement('button');
      delBtn.className = 'fsec-del';
      delBtn.title = 'Delete folder';
      delBtn.innerHTML = IC.trash;
      delBtn.onclick = async () => {
        if (!confirm(`Delete folder "${folder.name}"? Tasks will become unassigned.`)) return;
        await db.from('folders').delete().eq('id', folder.id);
        load();
      };
      right.appendChild(delBtn);
    }

    head.append(nameEl, right);
    sec.appendChild(head);

    const progWrap = document.createElement('div');
    progWrap.className = 'fsec-prog-wrap';
    const progFill = document.createElement('div');
    progFill.className = 'fsec-prog-fill personal';
    progFill.style.width = pct + '%';
    progWrap.appendChild(progFill);
    sec.appendChild(progWrap);

    if (activeTasks.length === 0) {
      const msg = document.createElement('div');
      msg.className = pct === 100 && totalCount > 0 ? 'fsec-all-done' : 'fsec-empty';
      msg.innerText = pct === 100 && totalCount > 0 ? 'All tasks complete' : 'No active tasks';
      sec.appendChild(msg);
    } else {
      const ul = document.createElement('ul');
      ul.className = 'fsec-list';
      activeTasks.forEach(t => ul.appendChild(buildTaskLi(t, load, { hideDesc: true, hideCatTag: true })));
      sec.appendChild(ul);
    }

    const addLink = document.createElement('a');
    addLink.className = 'fsec-add-btn';
    addLink.href = 'add.html?cat=' + CATEGORY + (folder ? '&folder=' + folder.id : '');
    addLink.innerText = '+ Add task';
    sec.appendChild(addLink);

    return sec;
  }

  load();
});
</script>
</body>
</html>
