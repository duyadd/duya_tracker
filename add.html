<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
<title>Add — Planner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h2>New task</h2>
  <p class="subtitle">Enter all the details in one place</p>

  <div class="add-card">
    <div id="msg" class="msg"></div>

    <label>Title *</label>
    <input type="text" id="f-title" placeholder="What needs doing?">

    <label>Description</label>
    <textarea id="f-desc" rows="3" placeholder="Detailed description (optional)"></textarea>

    <label>Category</label>
    <div class="btn-group" id="f-category" data-value="personal">
      <button type="button" class="btn-opt active" data-val="personal">Personal</button>
      <button type="button" class="btn-opt" data-val="work">Work</button>
    </div>

    <div class="form-row-2">
      <div>
        <label>Folder</label>
        <select id="f-folder"><option value="">— No folder —</option></select>
      </div>
      <div>
        <label>Assigned to</label>
        <input type="text" id="f-assignee" placeholder="Name (optional)">
      </div>
    </div>

    <label>Type</label>
    <div class="btn-group" id="f-kind" data-value="task">
      <button type="button" class="btn-opt active" data-val="task">Task</button>
      <button type="button" class="btn-opt" data-val="meeting">Meeting</button>
    </div>

    <label>Priority</label>
    <div class="btn-group" id="f-priority" data-value="0">
      <button type="button" class="btn-opt active" data-val="0">Normal</button>
      <button type="button" class="btn-opt" data-val="1">Medium ⚑</button>
      <button type="button" class="btn-opt" data-val="2">High ⚑</button>
    </div>

    <div class="form-row-2">
      <div>
        <label>Date</label>
        <input type="text" id="f-date" placeholder="Pick a date">
      </div>
      <div>
        <label>Time</label>
        <input type="time" id="f-time">
      </div>
    </div>

    <label>Status</label>
    <div class="btn-group" id="f-status" data-value="todo">
      <button type="button" class="btn-opt active" data-val="todo">○ Not started</button>
      <button type="button" class="btn-opt" data-val="doing">◐ In progress</button>
      <button type="button" class="btn-opt" data-val="done">● Done</button>
    </div>

    <button class="btn-primary" id="f-add">Add task</button>
  </div>

  <div class="section-title">Recently added</div>
  <ul id="recent-list"></ul>
  <div class="empty hidden" id="recent-empty">Nothing added yet</div>
</div>

<script src="app.js"></script>
<script>
requireAuth('add', (user) => {
  const fTitle    = document.getElementById('f-title');
  const fDesc     = document.getElementById('f-desc');
  const fFolder   = document.getElementById('f-folder');
  const fDate     = document.getElementById('f-date');
  const fTime     = document.getElementById('f-time');
  const fAssignee = document.getElementById('f-assignee');
  const msg         = document.getElementById('msg');
  const recentList  = document.getElementById('recent-list');
  const recentEmpty = document.getElementById('recent-empty');

  let folders   = [];
  let recentIds = [];

  attachDatePicker(fDate, false);
  const _qs = new URLSearchParams(window.location.search);
  const _prefillDate = _qs.get('date');
  if (_prefillDate) {
    if (fDate._flatpickr) fDate._flatpickr.setDate(_prefillDate); else fDate.value = _prefillDate;
  }
  const _prefillCat = _qs.get('cat');
  if (_prefillCat === 'personal' || _prefillCat === 'work') resetBtnGroup('f-category', _prefillCat);

  function showMsg(t, type) { msg.innerText = t; msg.className = 'msg' + (type ? ' ' + type : ''); }

  function getBtnGroupVal(id) {
    return document.getElementById(id).dataset.value;
  }
  function resetBtnGroup(id, val) {
    const grp = document.getElementById(id);
    grp.dataset.value = val;
    grp.querySelectorAll('.btn-opt').forEach(b => b.classList.toggle('active', b.dataset.val === val));
  }
  function initBtnGroup(id, onChange) {
    const grp = document.getElementById(id);
    grp.querySelectorAll('.btn-opt').forEach(btn => {
      btn.onclick = () => {
        grp.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        grp.dataset.value = btn.dataset.val;
        if (onChange) onChange();
      };
    });
  }

  initBtnGroup('f-category', renderFolderOptions);
  initBtnGroup('f-kind');
  initBtnGroup('f-priority');
  initBtnGroup('f-status');

  async function loadFolders() {
    const { data } = await db.from('folders').select('*').order('id', { ascending: true });
    folders = data || [];
    renderFolderOptions();
  }
  function renderFolderOptions() {
    const cat = getBtnGroupVal('f-category');
    const relevant = folders.filter(f => (f.category || 'work') === cat);
    fFolder.innerHTML = '<option value="">— No folder —</option>';
    relevant.forEach(f => {
      const o = document.createElement('option');
      o.value = f.id; o.innerText = f.name;
      fFolder.appendChild(o);
    });
  }

  document.getElementById('f-add').onclick = async () => {
    const title = fTitle.value.trim();
    if (!title) { showMsg('Please enter a title.', 'error'); fTitle.focus(); return; }
    const st = getBtnGroupVal('f-status');
    const { data, error } = await db.from('todos').insert([{
      title,
      description:  fDesc.value.trim() || null,
      category:     getBtnGroupVal('f-category'),
      folder_id:    fFolder.value || null,
      kind:         getBtnGroupVal('f-kind'),
      priority:     parseInt(getBtnGroupVal('f-priority'), 10),
      due_date:     fDate.value || null,
      due_time:     fTime.value || null,
      assignee:     fAssignee.value.trim() || null,
      status:       st,
      is_completed: st === 'done'
    }]).select();

    if (error) { showMsg('Error: ' + error.message, 'error'); return; }

    showMsg('✓ "' + title + '" added.', 'info');
    if (data && data[0]) recentIds.unshift(data[0].id);
    fTitle.value = ''; fDesc.value = ''; fTime.value = ''; fAssignee.value = '';
    resetBtnGroup('f-priority', '0');
    resetBtnGroup('f-kind', 'task');
    resetBtnGroup('f-status', 'todo');
    if (fDate._flatpickr) fDate._flatpickr.clear(); else fDate.value = '';
    fTitle.focus();
    loadRecent();
  };
  fTitle.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('f-add').click(); });

  async function loadRecent() {
    if (recentIds.length === 0) {
      const { data } = await db.from('todos').select('*').eq('is_deleted', false).order('id', { ascending: false }).limit(5);
      renderRecent(data || []);
      return;
    }
    const { data } = await db.from('todos').select('*').in('id', recentIds.slice(0, 10));
    const ordered = recentIds.slice(0,10).map(id => (data||[]).find(t => t.id === id)).filter(Boolean);
    renderRecent(ordered);
  }
  function renderRecent(tasks) {
    recentList.innerHTML = '';
    if (!tasks || tasks.length === 0) { recentEmpty.classList.remove('hidden'); return; }
    recentEmpty.classList.add('hidden');
    tasks.forEach(t => recentList.appendChild(buildTaskLi(t, loadRecent)));
  }

  loadFolders();
  loadRecent();
});
</script>
</body>
</html>
