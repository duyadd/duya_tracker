<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
<title>Sign in — Planner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-box">
  <h1>My Planner</h1>
  <p class="sub" id="sub">Sign in to continue</p>
  <div id="msg" class="msg"></div>

  <!-- Sign in / Sign up хэсэг -->
  <div id="auth-section">
    <label>Email</label>
    <input type="email" id="email" placeholder="name@example.com" autocomplete="username">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-primary" id="auth-btn">Sign in</button>
    <div class="switch-link" style="margin-top:12px;">
      <a id="forgot-link">Forgot your password?</a>
    </div>
    <div class="switch-link"><span id="switch-text">No account?</span> <a id="switch-link">Sign up</a></div>
  </div>

  <!-- Нууц үг мартсан: имэйл оруулах хэсэг -->
  <div id="forgot-section" class="hidden">
    <label>Email</label>
    <input type="email" id="forgot-email" placeholder="name@example.com" autocomplete="username">
    <button class="btn-primary" id="forgot-btn">Send reset link</button>
    <div class="switch-link"><a id="back-to-login">‹ Back to sign in</a></div>
  </div>

  <!-- Шинэ нууц үг тохируулах хэсэг (recovery линкээр ирэхэд) -->
  <div id="reset-section" class="hidden">
    <label>New password</label>
    <input type="password" id="new-password" placeholder="••••••••" autocomplete="new-password">
    <button class="btn-primary" id="reset-btn">Save password</button>
  </div>
</div>

<script src="app.js"></script>
<script>
  let mode = 'login';
  const sub = document.getElementById('sub');
  const msg = document.getElementById('msg');
  const emailEl = document.getElementById('email');
  const passEl = document.getElementById('password');
  const btn = document.getElementById('auth-btn');
  const switchText = document.getElementById('switch-text');
  const switchLink = document.getElementById('switch-link');

  const authSection = document.getElementById('auth-section');
  const forgotSection = document.getElementById('forgot-section');
  const resetSection = document.getElementById('reset-section');

  function showMsg(t, type) { msg.innerText = t; msg.className = 'msg' + (type ? ' ' + type : ''); }

  // ===== Recovery линкээр ирсэн эсэхийг шалгах =====
  // Supabase recovery линк дээр дарахад "PASSWORD_RECOVERY" event ажиллана
  let isRecovery = false;
  db.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      isRecovery = true;
      sub.innerText = 'Enter your new password';
      authSection.classList.add('hidden');
      forgotSection.classList.add('hidden');
      resetSection.classList.remove('hidden');
    }
  });

  // Хэрэв аль хэдийн нэвтэрсэн бол нүүр рүү (гэхдээ recovery үед биш)
  db.auth.getSession().then(({ data: { session } }) => {
    if (session && !isRecovery && !window.location.hash.includes('type=recovery')) {
      window.location.href = 'index.html';
    }
  });

  // ===== Sign in / Sign up горим =====
  switchLink.onclick = () => {
    mode = mode === 'login' ? 'signup' : 'login';
    if (mode === 'signup') {
      btn.innerText = 'Sign up'; sub.innerText = 'Create a new account';
      switchText.innerText = 'Have an account?'; switchLink.innerText = 'Sign in';
    } else {
      btn.innerText = 'Sign in'; sub.innerText = 'Sign in to continue';
      switchText.innerText = 'No account?'; switchLink.innerText = 'Sign up';
    }
    showMsg('', '');
  };

  btn.onclick = async () => {
    const email = emailEl.value.trim(), password = passEl.value;
    if (!email || !password) { showMsg('Please enter your email and password.', 'error'); return; }
    btn.disabled = true;
    if (mode === 'signup') {
      const { error } = await db.auth.signUp({ email, password });
      if (error) showMsg(error.message, 'error');
      else showMsg('Account created! If email confirmation is on, check your inbox; otherwise just sign in.', 'info');
    } else {
      const { error } = await db.auth.signInWithPassword({ email, password });
      if (error) showMsg(error.message, 'error');
      else window.location.href = 'index.html';
    }
    btn.disabled = false;
  };
  passEl.addEventListener('keypress', e => { if (e.key === 'Enter') btn.click(); });

  // ===== Нууц үг мартсан =====
  document.getElementById('forgot-link').onclick = () => {
    authSection.classList.add('hidden');
    forgotSection.classList.remove('hidden');
    sub.innerText = 'Reset password';
    showMsg('', '');
  };
  document.getElementById('back-to-login').onclick = () => {
    forgotSection.classList.add('hidden');
    authSection.classList.remove('hidden');
    sub.innerText = 'Sign in to continue';
    showMsg('', '');
  };

  document.getElementById('forgot-btn').onclick = async () => {
    const email = document.getElementById('forgot-email').value.trim();
    if (!email) { showMsg('Please enter your email.', 'error'); return; }
    const fbtn = document.getElementById('forgot-btn');
    fbtn.disabled = true;
    // Recovery линк энэ хуудас руу буцаж ирнэ
    const { error } = await db.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.href.split('#')[0]
    });
    if (error) showMsg(error.message, 'error');
    else showMsg('Reset link sent to ' + email + '. Check your inbox and click the link. (Check Spam/Junk too.)', 'info');
    fbtn.disabled = false;
  };

  // ===== Шинэ нууц үг тохируулах =====
  document.getElementById('reset-btn').onclick = async () => {
    const newPass = document.getElementById('new-password').value;
    if (!newPass || newPass.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
    const rbtn = document.getElementById('reset-btn');
    rbtn.disabled = true;
    const { error } = await db.auth.updateUser({ password: newPass });
    if (error) { showMsg(error.message, 'error'); rbtn.disabled = false; return; }
    showMsg('Password updated! Redirecting to home…', 'info');
    setTimeout(() => window.location.href = 'index.html', 1500);
  };
</script>
</body>
</html>
