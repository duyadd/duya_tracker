<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
<title>Work — Planner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h2>Work tasks</h2>
  <p class="subtitle">Organized by project folder</p>

  <div class="folder-bar" id="folder-bar"></div>

  <ul id="task-list"></ul>
  <div class="empty hidden" id="empty">No tasks. Add one from the ➕ Add Task page.</div>
</div>

<script src="app.js"></script>
<script>
requireAuth('work', (user) => {
  const list = document.getElementById('task-list');
  const empty = document.getElementById('empty');
  const folderBar = document.getElementById('folder-bar');

  let folders = [];
  const _params = new URLSearchParams(window.location.search);
  let activeFolder = _params.get('folder') || 'all';
  const CATEGORY = 'work';

  async function loadFolders() {
    const { data } = await db.from('folders').select('*')
      .eq('category', CATEGORY).order('id', { ascending: true });
    folders = data || [];
    renderFolders();
    if (typeof renderNavFolders === 'function') renderNavFolders(CATEGORY);
  }

  function renderFolders() {
    folderBar.innerHTML = '';
    // Одоогийн шүүлтийн төлөв: "Бүгд" эсвэл сонгосон фолдер
    if (activeFolder === 'all') {
      const allChip = document.createElement('div');
      allChip.className = 'folder-chip active';
      allChip.innerText = 'All tasks';
      folderBar.appendChild(allChip);
    } else {
      const cur = folders.find(f => String(f.id) === String(activeFolder));
      const chip = document.createElement('div');
      chip.className = 'folder-chip active';
      chip.innerText = '📁 ' + (cur ? cur.name : 'Folder');
      folderBar.appendChild(chip);

      const allLink = document.createElement('div');
      allLink.className = 'folder-chip';
      allLink.innerText = '← All';
      allLink.onclick = () => { activeFolder = 'all'; renderFolders(); loadTasks(); };
      folderBar.appendChild(allLink);

      // Сонгосон фолдерыг устгах
      if (cur) {
        const del = document.createElement('div');
        del.className = 'folder-chip';
        del.innerText = '🗑 Delete';
        del.onclick = async () => {
          if (!confirm(`"${cur.name}" — delete this folder? (its tasks stay, just become folderless)`)) return;
          await db.from('folders').delete().eq('id', cur.id);
          activeFolder = 'all';
          loadFolders(); loadTasks();
        };
        folderBar.appendChild(del);
      }
    }

    const addBtn = document.createElement('button');
    addBtn.className = 'add-folder';
    addBtn.innerText = '+ Folder';
    addBtn.onclick = async () => {
      const name = prompt('New folder name:');
      if (!name || !name.trim()) return;
      await db.from('folders').insert([{ name: name.trim(), category: CATEGORY }]);
      loadFolders();
    };
    folderBar.appendChild(addBtn);
  }

  async function loadTasks() {
    let q = db.from('todos').select('*').eq('category', CATEGORY).eq('is_completed', false).eq('is_deleted', false);
    if (activeFolder !== 'all') q = q.eq('folder_id', activeFolder);
    const { data } = await q.order('priority', { ascending: false }).order('id', { ascending: true });
    list.innerHTML = '';
    if (!data || data.length === 0) { empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');
    data.forEach(t => list.appendChild(buildTaskLi(t, loadTasks)));
  }



  loadFolders();
  loadTasks();
});
</script>
</body>
</html>
