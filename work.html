<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
<title>Ажил — Төлөвлөгөө</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h2>Ажлын даалгавар</h2>
  <p class="subtitle">Төслийн фолдероор ангилсан</p>

  <div class="folder-bar" id="folder-bar"></div>

  <div class="add-card">
    <div class="row">
      <input type="text" id="task-input" placeholder="Ажлын даалгавар...">
      <input type="date" id="due-input">
      <button id="add-btn">Нэмэх</button>
    </div>
  </div>

  <ul id="task-list"></ul>
  <div class="empty hidden" id="empty">Энэ фолдерт даалгавар алга 📂</div>
</div>

<script src="app.js"></script>
<script>
requireAuth('work', (user) => {
  const taskInput = document.getElementById('task-input');
  const dueInput = document.getElementById('due-input');
  const list = document.getElementById('task-list');
  const empty = document.getElementById('empty');
  const folderBar = document.getElementById('folder-bar');

  let folders = [];
  let activeFolder = 'all'; // 'all' эсвэл folder id

  async function loadFolders() {
    const { data } = await db.from('folders').select('*').order('id', { ascending: true });
    folders = data || [];
    renderFolders();
  }

  function renderFolders() {
    folderBar.innerHTML = '';
    // "Бүгд" чип
    const allChip = document.createElement('div');
    allChip.className = 'folder-chip' + (activeFolder === 'all' ? ' active' : '');
    allChip.innerText = 'Бүгд';
    allChip.onclick = () => { activeFolder = 'all'; renderFolders(); loadTasks(); };
    folderBar.appendChild(allChip);

    folders.forEach(f => {
      const chip = document.createElement('div');
      chip.className = 'folder-chip' + (activeFolder === f.id ? ' active' : '');
      const label = document.createElement('span');
      label.innerText = '📁 ' + f.name;
      label.onclick = () => { activeFolder = f.id; renderFolders(); loadTasks(); };
      const x = document.createElement('span');
      x.className = 'x'; x.innerText = '✕';
      x.onclick = async (e) => {
        e.stopPropagation();
        if (!confirm(`"${f.name}" фолдерыг устгах уу? (доторх даалгаврууд устахгүй, зүгээр фолдергүй болно)`)) return;
        await db.from('folders').delete().eq('id', f.id);
        if (activeFolder === f.id) activeFolder = 'all';
        loadFolders(); loadTasks();
      };
      chip.append(label, x);
      folderBar.appendChild(chip);
    });

    // Шинэ фолдер нэмэх товч
    const addBtn = document.createElement('button');
    addBtn.className = 'add-folder';
    addBtn.innerText = '+ Фолдер';
    addBtn.onclick = async () => {
      const name = prompt('Шинэ фолдерын нэр:');
      if (!name || !name.trim()) return;
      await db.from('folders').insert([{ name: name.trim() }]);
      loadFolders();
    };
    folderBar.appendChild(addBtn);
  }

  async function loadTasks() {
    let q = db.from('todos').select('*').eq('category', 'work');
    if (activeFolder !== 'all') q = q.eq('folder_id', activeFolder);
    const { data } = await q.order('id', { ascending: true });
    list.innerHTML = '';
    if (!data || data.length === 0) { empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');
    data.forEach(t => list.appendChild(buildTaskLi(t, loadTasks)));
  }

  async function add() {
    const title = taskInput.value.trim();
    if (!title) return;
    await db.from('todos').insert([{
      title, is_completed: false, category: 'work',
      due_date: dueInput.value || null,
      folder_id: activeFolder === 'all' ? null : activeFolder
    }]);
    taskInput.value = ''; dueInput.value = '';
    loadTasks();
  }

  document.getElementById('add-btn').onclick = add;
  taskInput.addEventListener('keypress', e => { if (e.key === 'Enter') add(); });

  loadFolders();
  loadTasks();
});
</script>
</body>
</html>
