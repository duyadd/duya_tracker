<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
<title>Хуваарь — Төлөвлөгөө</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h2>Долоо хоногийн хуваарь</h2>
  <p class="subtitle">Огноо, цаг бүхий даалгавар, уулзалтууд</p>

  <div class="cal-head">
    <button id="prev">‹ Өмнөх</button>
    <span class="range" id="range"></span>
    <button id="next">Дараах ›</button>
    <button id="today-btn">Өнөөдөр</button>
  </div>

  <div class="week-grid" id="grid"></div>
</div>

<script src="app.js"></script>
<script>
requireAuth('calendar', (user) => {
  const grid = document.getElementById('grid');
  const rangeEl = document.getElementById('range');
  const WEEKDAYS = ['Ня', 'Да', 'Мя', 'Лха', 'Пүр', 'Ба', 'Бя'];

  // Долоо хоногийн эхлэл (Даваа гараг)
  let anchor = new Date();
  anchor.setHours(0,0,0,0);

  function startOfWeek(d) {
    const x = new Date(d);
    const day = (x.getDay() + 6) % 7; // Даваа = 0
    x.setDate(x.getDate() - day);
    return x;
  }
  function ymd(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  async function render() {
    const start = startOfWeek(anchor);
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      days.push(d);
    }
    const startStr = ymd(days[0]);
    const endStr = ymd(days[6]);
    rangeEl.innerText = days[0].toLocaleDateString('mn-MN', {month:'short', day:'numeric'})
      + ' – ' + days[6].toLocaleDateString('mn-MN', {month:'short', day:'numeric'});

    // Энэ долоо хоногийн огноотой зүйлсийг татах
    const { data } = await db.from('todos').select('*')
      .gte('due_date', startStr).lte('due_date', endStr);
    const items = data || [];

    const todayStr = ymd(new Date());
    grid.innerHTML = '';
    days.forEach((d, idx) => {
      const dStr = ymd(d);
      const col = document.createElement('div');
      col.className = 'day-col' + (dStr === todayStr ? ' today' : '');
      const head = document.createElement('div');
      head.className = 'day-head';
      head.innerHTML = `${WEEKDAYS[(idx+1)%7]}<div class="dnum">${d.getDate()}</div>`;
      col.appendChild(head);

      // Тухайн өдрийн зүйлс, цагаар эрэмбэлсэн
      const dayItems = items.filter(t => t.due_date === dStr)
        .sort((a,b) => (a.due_time||'99').localeCompare(b.due_time||'99'));
      dayItems.forEach(t => {
        const item = document.createElement('div');
        item.className = 'cal-item ' + (t.category === 'work' ? 'work' : 'personal')
          + (t.kind === 'meeting' ? ' meeting' : '')
          + (t.is_completed ? ' completed' : '');
        const timeStr = t.due_time ? formatTime(t.due_time) : '';
        item.innerHTML = `${timeStr ? `<div class="t">${timeStr}</div>` : ''}<div class="ttl">${(t.kind==='meeting'?'👥 ':'')}${escapeHtml(t.title)}</div>`;
        item.title = (t.assignee ? 'Хариуцагч: ' + t.assignee : '') ;
        item.onclick = () => { window.location.href = (t.category === 'work' ? 'work.html' : 'personal.html'); };
        col.appendChild(item);
      });
      grid.appendChild(col);
    });
  }

  function escapeHtml(s) {
    const div = document.createElement('div'); div.innerText = s; return div.innerHTML;
  }

  document.getElementById('prev').onclick = () => { anchor.setDate(anchor.getDate()-7); render(); };
  document.getElementById('next').onclick = () => { anchor.setDate(anchor.getDate()+7); render(); };
  document.getElementById('today-btn').onclick = () => { anchor = new Date(); anchor.setHours(0,0,0,0); render(); };

  render();
});
</script>
</body>
</html>
