<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
<title>Home — Planner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h2>Overview</h2>
  <p class="subtitle">Today's snapshot</p>
  <div class="cards" id="cards"></div>

  <div class="view-toggle">
    <button id="btn-today" class="active">Today</button>
    <button id="btn-week">Week</button>
    <button id="btn-progress">Progress</button>
  </div>

  <!-- Өнөөдрийн agenda -->
  <div id="today-view">
    <ul id="agenda-list" style="list-style:none;"></ul>
    <div class="empty hidden" id="empty-today">Nothing scheduled for today 🌤️</div>
  </div>

  <!-- Долоо хоногийн жижиг харагдац -->
  <div id="week-view" class="hidden">
    <div class="week-grid" id="week-grid"></div>
  </div>

  <!-- Явцын самбар -->
  <div id="progress-view" class="hidden">
    <div class="folder-bar" id="board-cat-bar"></div>
    <div class="board" id="board"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
requireAuth('home', async (user) => {
  const { data: todos } = await db.from('todos').select('*');
  const list = todos || [];

  // ----- Тоймын картууд -----
  const total = list.length;
  const done = list.filter(t => t.is_completed).length;
  const active = total - done;
  const personal = list.filter(t => t.category !== 'work' && !t.is_completed).length;
  const work = list.filter(t => t.category === 'work' && !t.is_completed).length;
  const highPrio = list.filter(t => t.priority === 2 && !t.is_completed).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('cards').innerHTML = `
    <div class="card"><div class="num">${active}</div><div class="lbl">Active</div></div>
    <div class="card"><div class="num">${highPrio}</div><div class="lbl">High priority</div></div>
    <div class="card"><div class="num">${personal}</div><div class="lbl">Personal</div></div>
    <div class="card"><div class="num">${work}</div><div class="lbl">Work</div></div>
    <div class="card">
      <div class="num">${pct}%</div><div class="lbl">Completion</div>
      <div class="progress"><span style="width:${pct}%"></span></div>
    </div>`;

  // ----- Огнооны туслах -----
  function ymd(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  const todayStr = ymd(new Date());

  // ----- Өнөөдрийн agenda -----
  const agendaList = document.getElementById('agenda-list');
  const todayItems = list
    .filter(t => t.due_date === todayStr)
    .sort((a,b) => (a.due_time||'99').localeCompare(b.due_time||'99'));

  if (todayItems.length === 0) {
    document.getElementById('empty-today').classList.remove('hidden');
  } else {
    todayItems.forEach(t => {
      const li = document.createElement('li');
      li.className = 'agenda-item';
      const bar = document.createElement('div');
      bar.className = 'agenda-bar ' + (t.category === 'work' ? 'work' : '') + (t.kind === 'meeting' ? ' meeting' : '');
      const time = document.createElement('div');
      time.className = 'agenda-time' + (t.due_time ? '' : ' allday');
      time.innerText = t.due_time ? formatTime(t.due_time) : 'All day';
      const body = document.createElement('div');
      body.className = 'agenda-body';
      const ttl = document.createElement('div');
      ttl.className = 'agenda-title' + (t.is_completed ? ' completed' : '');
      ttl.innerText = (t.kind === 'meeting' ? '👥 ' : '') + t.title;
      const meta = document.createElement('div');
      meta.className = 'agenda-meta';
      const bits = [t.category === 'work' ? 'Work' : 'Personal'];
      if (t.assignee) bits.push('👤 ' + t.assignee);
      meta.innerText = bits.join(' · ');
      body.append(ttl, meta);
      li.append(bar, time, body);
      agendaList.appendChild(li);
    });
  }

  // ----- Долоо хоногийн жижиг харагдац -----
  const WEEKDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  function startOfWeek(d) {
    const x = new Date(d); x.setHours(0,0,0,0);
    const day = (x.getDay() + 6) % 7;
    x.setDate(x.getDate() - day);
    return x;
  }
  const start = startOfWeek(new Date());
  const grid = document.getElementById('week-grid');
  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    const dStr = ymd(d);
    const col = document.createElement('div');
    col.className = 'day-col' + (dStr === todayStr ? ' today' : '');
    col.innerHTML = `<div class="day-head">${WEEKDAYS[(i+1)%7]}<div class="dnum">${d.getDate()}</div></div>`;
    const dayItems = list.filter(t => t.due_date === dStr)
      .sort((a,b) => (a.due_time||'99').localeCompare(b.due_time||'99'));
    dayItems.forEach(t => {
      const item = document.createElement('div');
      item.className = 'cal-item ' + (t.category === 'work' ? 'work' : 'personal')
        + (t.kind === 'meeting' ? ' meeting' : '') + (t.is_completed ? ' completed' : '');
      const div = document.createElement('div'); div.innerText = t.title;
      const tStr = t.due_time ? formatTime(t.due_time) : '';
      item.innerHTML = (tStr ? `<div class="t">${tStr}</div>` : '') + `<div class="ttl">${(t.kind==='meeting'?'👥 ':'')}${div.innerHTML}</div>`;
      col.appendChild(item);
    });
    grid.appendChild(col);
  }

  // ----- Харагдац солих -----
  const btnToday = document.getElementById('btn-today');
  const btnWeek = document.getElementById('btn-week');
  const btnProgress = document.getElementById('btn-progress');
  const todayView = document.getElementById('today-view');
  const weekView = document.getElementById('week-view');
  const progressView = document.getElementById('progress-view');

  function setView(which) {
    [btnToday, btnWeek, btnProgress].forEach(b => b.classList.remove('active'));
    [todayView, weekView, progressView].forEach(v => v.classList.add('hidden'));
    if (which === 'today') { btnToday.classList.add('active'); todayView.classList.remove('hidden'); }
    if (which === 'week') { btnWeek.classList.add('active'); weekView.classList.remove('hidden'); }
    if (which === 'progress') { btnProgress.classList.add('active'); progressView.classList.remove('hidden'); renderBoard(); }
  }
  btnToday.onclick = () => setView('today');
  btnWeek.onclick = () => setView('week');
  btnProgress.onclick = () => setView('progress');

  // ----- Явцын самбар (board) -----
  const board = document.getElementById('board');
  const boardCatBar = document.getElementById('board-cat-bar');
  let boardCat = 'all';
  const COLUMNS = [
    { key: 'todo',  label: 'Not started' },
    { key: 'doing', label: 'In progress' },
    { key: 'done',  label: 'Done' }
  ];

  function renderBoardCatBar() {
    boardCatBar.innerHTML = '';
    [['all','All'], ['personal','Personal'], ['work','Work']].forEach(([v, label]) => {
      const chip = document.createElement('div');
      chip.className = 'folder-chip' + (boardCat === v ? ' active' : '');
      chip.innerText = label;
      chip.onclick = () => { boardCat = v; renderBoardCatBar(); renderBoard(); };
      boardCatBar.appendChild(chip);
    });
  }

  function renderBoard() {
    renderBoardCatBar();
    const filtered = boardCat === 'all' ? list : list.filter(t => t.category === boardCat);
    board.innerHTML = '';
    COLUMNS.forEach(col => {
      const colTasks = filtered.filter(t => {
        const st = t.status || (t.is_completed ? 'done' : 'todo');
        return st === col.key;
      }).sort((a,b) => (b.priority||0) - (a.priority||0));

      const colEl = document.createElement('div');
      colEl.className = 'board-col';
      colEl.innerHTML = `
        <div class="board-col-head">
          <span class="ttl"><span class="board-dot ${col.key}"></span>${col.label}</span>
          <span class="cnt">${colTasks.length}</span>
        </div>`;

      if (colTasks.length === 0) {
        const e = document.createElement('div');
        e.className = 'board-empty'; e.innerText = '—';
        colEl.appendChild(e);
      }

      colTasks.forEach(t => {
        const card = document.createElement('div');
        card.className = 'board-card' + (col.key === 'done' ? ' done-card' : '');
        const title = document.createElement('div');
        title.className = 'bc-title';
        title.innerText = (t.kind === 'meeting' ? '👥 ' : '') + t.title;
        const meta = document.createElement('div');
        meta.className = 'bc-meta';
        const catTag = document.createElement('span');
        catTag.className = 'tag ' + (t.category === 'work' ? 'work' : 'personal');
        catTag.innerText = t.category === 'work' ? 'Work' : 'Personal';
        meta.appendChild(catTag);
        if (t.due_date) {
          const d = document.createElement('span');
          d.className = 'tag due' + (isOverdue(t.due_date, t.is_completed) ? ' overdue' : '');
          d.innerText = '📅 ' + formatDate(t.due_date);
          meta.appendChild(d);
        }

        // Unified status dropdown
        const sel = buildStatusSelect(t, renderBoard);

        card.append(title, meta, sel);
        colEl.appendChild(card);
      });

      board.appendChild(colEl);
    });
  }
});
</script>
</body>
</html>
